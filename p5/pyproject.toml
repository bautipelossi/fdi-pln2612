[project]
name = "p5-tiny-llm"
version = "0.1.0"
description = "P5: Tiny LLM desde tokenizacion BPE hasta generacion"
readme = "README.md"
requires-python = ">=3.11,<3.13"
dependencies = [
    "loguru>=0.7",
    "numpy>=1.26",
    "torch>=2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = false
